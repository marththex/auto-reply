# Copy to facts.yaml (gitignored) and fill in real values.
# Injected into every draft-generation prompt so the model stops inventing
# personal details. Free-form YAML: nesting becomes "key / subkey: value"
# bullet lines in the prompt. Keep it short - this spends context tokens.
#
# identity.name also sets the persona name used in the prompts ("Write the
# reply <first name> would send...").

identity:
  name: Jane Doe
  employer: Example Corp
  role: Senior Widget Engineer
  location: Springfield

relationships:
  - cousin Ben, software engineer at a big-tech firm in Seattle

availability:
  meetings: weekday evenings after 6pm
  timezone: America/Los_Angeles

# Situational facts leak into unrelated drafts if left unconditional -
# gate them with an explicit condition on the section key (rendered into
# every bullet of the section). See DECISIONS.md 2026-07-11.
job_search (mention ONLY if this email is from a recruiter or hiring contact about a specific role):
  status: not currently looking for new roles

# Standing instructions for every draft - the model follows these more
# reliably than it recalls facts, so put guardrails here. Keep every rule
# either safe in an arbitrary reply or explicitly conditional.
drafting_rules:
  - do not add a signature or sign-off name; a signature block is appended automatically
  - never write or sign as anyone other than Jane
  - reply only to what this email actually says
  - if a needed fact is not listed above, leave a [placeholder] instead of guessing
